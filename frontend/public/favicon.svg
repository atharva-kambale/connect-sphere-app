<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Core background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagon Base representing Sphere/Network -->
  <path d="M100 20 L170 60 L170 140 L100 180 L30 140 L30 60 Z" fill="url(#grad1)" />
  
  <!-- Interlocking geometric spheres/circles -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3" />
  
  <!-- Link / Connect nodes -->
  <circle cx="100" cy="50" r="14" fill="#ffffff" filter="url(#glow)" />
  <circle cx="60" cy="120" r="14" fill="url(#grad2)" stroke="#ffffff" stroke-width="3" />
  <circle cx="140" cy="120" r="14" fill="url(#grad2)" stroke="#ffffff" stroke-width="3" />
  
  <!-- Connecting Lines -->
  <line x1="100" y1="50" x2="60" y2="120" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9" />
  <line x1="100" y1="50" x2="140" y2="120" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9" />
  <line x1="60" y1="120" x2="140" y2="120" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9" />

  <!-- Central Energy Core -->
  <circle cx="100" cy="100" r="8" fill="#ffffff" filter="url(#glow)" />
</svg>